

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: laravel-app
    container_name: laravel_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - laravel_network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel_network
    depends_on:
      - app

  db:
    image: postgres:15
    container_name: pg-batalha-naval
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-batalha_naval}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-laravel}
    volumes:
      - pgsql-data:/var/lib/postgresql/data
    networks:
      - laravel_network

  node:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    image: laravel-node
    container_name: laravel_node
    volumes:
      - ./:/var/www/html
    networks:
      - laravel_network
    profiles:
      - build

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - laravel_network
    restart: unless-stopped

networks:
  laravel_network:
    driver: bridge

volumes:
  pgsql-data:
